<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostRoom</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  height:100%;
  font-family:system-ui;
  background:#0f0f14;
  color:white;
}

/* ЭКРАНЫ */
.screen{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  text-align:center;
}

input{
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:14px;
  width:100%;
  max-width:320px;
  background:#23233a;
  color:white;
  font-size:16px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:14px;
  background:#6d5dfc;
  color:white;
  font-size:15px;
  cursor:pointer;
  margin-top:6px;
}

/* ЧАТ */
.chat{
  display:none;
  height:100%;
  display:flex;
  flex-direction:column;
}

/* Верх */
.topbar{
  height:55px;
  background:#171722;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  border-bottom:1px solid #26263a;
  flex-shrink:0;
}

.topbar .admin-controls button{
  background:#23233a;
  padding:6px 10px;
  font-size:12px;
  margin-left:5px;
}

/* Сообщения */
.messages{
  flex:1;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* Сообщение */
.message{
  max-width:80%;
  padding:10px;
  border-radius:16px;
  word-wrap:break-word;
  background:#23233a;
  align-self:flex-start;
}

.message.user{
  align-self:flex-end;
  background:#6d5dfc;
}

.message-header{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  margin-bottom:5px;
}

.avatar{
  width:20px;
  height:20px;
  border-radius:50%;
}

.controls{
  font-size:12px;
  margin-top:5px;
  opacity:0.7;
}

.controls span{
  margin-right:6px;
  cursor:pointer;
}

/* Ввод */
.input-area{
  display:flex;
  padding:8px;
  background:#171722;
  gap:6px;
  border-top:1px solid #26263a;
  flex-shrink:0;
}

.input-area input[type="text"]{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  background:#23233a;
  color:white;
}

.file-btn{
  background:#23233a;
  padding:0 12px;
  border-radius:20px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen" id="login">
  <h2>🔐 GhostRoom</h2>
  <input type="password" id="password" placeholder="Введите пароль">
  <button onclick="enter()">Войти</button>
</div>

<!-- NICK -->
<div class="screen" id="nicknameScreen" style="display:none">
  <h2>Ваш ник</h2>
  <input type="text" id="nickname" placeholder="Введите ник">
  <button onclick="startChat()">Продолжить</button>
</div>

<!-- CHAT -->
<div class="chat" id="chat">
  <div class="topbar">
    <div>
      <strong id="roomName">Комната 1 👻</strong>
    </div>
    <div class="admin-controls" id="adminControls"></div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="file" id="fileInput" hidden>
    <button class="file-btn" onclick="document.getElementById('fileInput').click()">📎</button>
    <input type="text" id="messageInput" placeholder="Сообщение...">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
let role="user";
let avatar="";
let username="Аноним";
let roomCount=1;

function enter(){
  const pass=document.getElementById("password").value;

  if(pass==="Benjamin"){
    role="user";
    avatar="privacy-mask-icon-design-vector-260nw-1715757265.jpg";
  }
  else if(pass==="Burmese"){
    role="admin";
    avatar="YetAnotherBot.jpg";
  }
  else{
    alert("Неверный пароль");
    return;
  }

  document.getElementById("login").style.display="none";
  document.getElementById("nicknameScreen").style.display="flex";
}

function startChat(){
  const nick=document.getElementById("nickname").value.trim();
  if(nick!=="") username=nick;

  document.getElementById("nicknameScreen").style.display="none";
  document.getElementById("chat").style.display="flex";

  if(role==="admin"){
    document.getElementById("adminControls").innerHTML=`
      <button onclick="clearChat()">Очистить</button>
      <button onclick="newRoom()">Новый чат</button>
    `;
  }
}

function sendMessage(){
  const input=document.getElementById("messageInput");
  const text=input.value.trim();
  if(!text) return;

  const msg=createMessage(text);
  document.getElementById("messages").appendChild(msg);

  input.value="";
  scrollBottom();
}

function createMessage(text){
  const msg=document.createElement("div");
  msg.className="message user";

  msg.innerHTML=`
    <div class="message-header">
      <img src="${avatar}" class="avatar">
      <strong>${username}</strong>
    </div>
    <div>${text}</div>
    <div class="controls">
      <span onclick="editMessage(this)">✏</span>
      <span onclick="deleteMessage(this)">🗑</span>
    </div>
  `;

  return msg;
}

function deleteMessage(el){
  el.closest(".message").remove();
}

function editMessage(el){
  const msg=el.closest(".message");
  const textDiv=msg.children[1];
  const newText=prompt("Редактировать:",textDiv.innerText);
  if(newText!==null) textDiv.innerText=newText;
}

function clearChat(){
  if(confirm("Очистить весь чат?")){
    document.getElementById("messages").innerHTML="";
  }
}

function newRoom(){
  roomCount++;
  document.getElementById("messages").innerHTML="";
  document.getElementById("roomName").innerText="Комната "+roomCount+" 👻";
}

function scrollBottom(){
  const box=document.getElementById("messages");
  box.scrollTop=box.scrollHeight;
}
</script>

</body>
</html>
