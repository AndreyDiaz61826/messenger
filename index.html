<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GhostRoom</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:#0f0f14;
  color:white;
  height:100vh;
  overflow:hidden;
}

/* ЭКРАНЫ */
.screen{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  text-align:center;
}

input{
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:14px;
  width:100%;
  max-width:320px;
  background:#23233a;
  color:white;
  font-size:16px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:14px;
  background:#6d5dfc;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:5px;
}

/* ЧАТ */
.chat{
  display:none;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.topbar{
  height:60px;
  background:#171722;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  border-bottom:1px solid #26263a;
  flex-shrink:0;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.message{
  max-width:75%;
  padding:12px;
  border-radius:18px;
  position:relative;
  word-wrap:break-word;
}

.message.user{
  align-self:flex-end;
  background:#6d5dfc;
}

.message.other{
  align-self:flex-start;
  background:#23233a;
}

.message-header{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  margin-bottom:6px;
}

.avatar{
  width:22px;
  height:22px;
  border-radius:50%;
}

.controls{
  font-size:12px;
  margin-top:6px;
  opacity:0.7;
}

.controls span{
  margin-right:8px;
  cursor:pointer;
}

.input-area{
  display:flex;
  padding:10px;
  background:#171722;
  gap:8px;
  border-top:1px solid #26263a;
  flex-shrink:0;
}

.input-area input[type="text"]{
  flex:1;
  margin:0;
}

.file-btn{
  background:#23233a;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen" id="login">
  <h2>🔐 Доступ в GhostRoom</h2>
  <input type="password" id="password" placeholder="Введите пароль">
  <button onclick="enter()">Войти</button>
</div>

<!-- NICK -->
<div class="screen" id="nicknameScreen" style="display:none">
  <h2>Ваш ник</h2>
  <input type="text" id="nickname" placeholder="Введите ник">
  <button onclick="startChat()">Продолжить</button>
</div>

<!-- CHAT -->
<div class="chat" id="chat">
  <div class="topbar">
    <h3>GhostRoom 👻</h3>
    <span id="roleBadge"></span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="file" id="fileInput" hidden>
    <button class="file-btn" onclick="document.getElementById('fileInput').click()">📎</button>
    <input type="text" id="messageInput" placeholder="Сообщение...">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
let role="user";
let avatar="";
let username="Аноним";

function enter(){
  const pass=document.getElementById("password").value;

  if(pass==="Benjamin"){
    role="user";
    avatar="privacy-mask-icon-design-vector-260nw-1715757265.jpg";
  }
  else if(pass==="Burmese"){
    role="admin";
    avatar="YetAnotherBot.jpg";
  }
  else{
    alert("Неверный пароль");
    return;
  }

  document.getElementById("login").style.display="none";
  document.getElementById("nicknameScreen").style.display="flex";
}

function startChat(){
  const nick=document.getElementById("nickname").value.trim();
  if(nick!=="") username=nick;

  document.getElementById("nicknameScreen").style.display="none";
  document.getElementById("chat").style.display="flex";

  document.getElementById("roleBadge").innerText=
    role==="admin" ? "👑 Admin" : "👤 User";
}

function sendMessage(){
  const input=document.getElementById("messageInput");
  const text=input.value.trim();
  if(!text) return;

  const msg=createMessageElement(text,null);
  document.getElementById("messages").appendChild(msg);

  input.value="";
  scrollBottom();
}

document.getElementById("fileInput").addEventListener("change",function(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=function(event){
    const msg=createMessageElement(null,{
      name:file.name,
      type:file.type,
      data:event.target.result
    });
    document.getElementById("messages").appendChild(msg);
    scrollBottom();
  };
  reader.readAsDataURL(file);
});

function createMessageElement(text,file){
  const msg=document.createElement("div");
  msg.className="message user";

  let content="";

  if(text){
    content=`<div>${text}</div>`;
  }

  if(file){
    if(file.type.startsWith("image/")){
      content=`<img src="${file.data}" style="max-width:100%;border-radius:12px;">`;
    }
    else if(file.type.startsWith("video/")){
      content=`<video controls style="max-width:100%;border-radius:12px;">
                 <source src="${file.data}" type="${file.type}">
               </video>`;
    }
    else if(file.type.startsWith("audio/")){
      content=`<audio controls src="${file.data}"></audio>`;
    }
    else{
      content=`<a href="${file.data}" download="${file.name}" style="color:white;text-decoration:underline;">
               📎 ${file.name}</a>`;
    }
  }

  msg.innerHTML=`
    <div class="message-header">
      <img src="${avatar}" class="avatar">
      <strong>${username}</strong>
    </div>
    ${content}
    <div class="controls">
      <span onclick="editMessage(this)">✏</span>
      <span onclick="deleteMessage(this)">🗑</span>
    </div>
  `;

  return msg;
}

function deleteMessage(el){
  el.closest(".message").remove();
}

function editMessage(el){
  const message=el.closest(".message");
  const textDiv=message.querySelector("div:nth-child(2)");
  if(!textDiv) return;
  const newText=prompt("Редактировать:",textDiv.innerText);
  if(newText!==null) textDiv.innerText=newText;
}

function scrollBottom(){
  const box=document.getElementById("messages");
  box.scrollTop=box.scrollHeight;
}
</script>

</body>
</html>
