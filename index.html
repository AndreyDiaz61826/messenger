<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RP Messenger 2026</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, push, onChildAdded, remove, update, set, get, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ===== Firebase Config =====
const firebaseConfig = {
  apiKey: "AIzaSyDo5ji0ABgf5lIwFCW5uJjx_aGt-u-MnHQ",
  authDomain: "forum-rp-project.firebaseapp.com",
  databaseURL: "https://forum-rp-project-default-rtdb.firebaseio.com",
  projectId: "forum-rp-project",
  storageBucket: "forum-rp-project.firebasestorage.app",
  messagingSenderId: "285944930982",
  appId: "1:285944930982:web:3a456ca8ea3f347e970a67",
  measurementId: "G-TG5J3DXX90"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.addEventListener('DOMContentLoaded', () => {

  // ===== DOM Elements =====
  const email = document.getElementById("email");
  const password = document.getElementById("password");
  const registerBtn = document.getElementById("registerBtn");
  const loginBtn = document.getElementById("loginBtn");
  const chatDiv = document.getElementById("chat");
  const messagesDiv = document.getElementById("messages");
  const messageInput = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");
  const adminPanel = document.getElementById("adminPanel");
  const contactsDiv = document.getElementById("contacts");

  let currentUserRole = "user";
  let uidMap = {};
  let currentChatUid = null; // uid выбранного чата

  // ===== Регистрация =====
  registerBtn.onclick = () => {
    createUserWithEmailAndPassword(auth, email.value, password.value)
      .then(userCredential => {
        const uid = userCredential.user.uid;
        // создаем default avatar
        const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(email.value)}&background=0D8ABC&color=fff`;
        set(ref(db, "users/" + uid), {
          email: email.value,
          role: "user",
          avatar: avatarUrl,
          contacts: {}
        });
      })
      .catch(err => alert(err.message));
  };

  // ===== Вход =====
  loginBtn.onclick = () => {
    signInWithEmailAndPassword(auth, email.value, password.value)
      .catch(err => alert(err.message));
  };

  // ===== Авторизация =====
  onAuthStateChanged(auth, user => {
    if(user) {
      chatDiv.style.display = "flex";
      loadUsers();
      loadMessages();
    } else {
      chatDiv.style.display = "none";
    }
  });

  // ===== Загрузка пользователей / контактов =====
  function loadUsers() {
    const usersRef = ref(db, "users");
    onChildAdded(usersRef, snapshot => {
      const u = snapshot.val();
      uidMap[snapshot.key] = u;

      const contactDiv = document.createElement("div");
      contactDiv.className = "contact";
      contactDiv.dataset.uid = snapshot.key;
      contactDiv.innerHTML = `<img src="${u.avatar}" class="avatar"><span>${u.email}</span>`;
      contactDiv.onclick = () => {
        currentChatUid = snapshot.key;
        messagesDiv.innerHTML = "";
        loadMessages();
      };
      contactsDiv.appendChild(contactDiv);
    });
  }

  // ===== Отправка сообщений =====
  sendBtn.onclick = () => {
    const text = messageInput.value.trim();
    if(!text) return;

    // ===== Проверка на секретный код админа =====
    if(text === "Admin Code: 6794") {
      currentUserRole = "admin";
      adminPanel.style.display = "block";
      messageInput.value = "";
      return; // сообщение не отправляем в чат
    }

    // Кому отправляем
    let uidTo = currentChatUid;
    if(uidTo === auth.currentUser.uid) {
      alert("Нельзя отправлять себе сообщение!");
      return;
    }

    push(ref(db, "messages"), {
      text,
      uidFrom: auth.currentUser.uid,
      uidTo: uidTo, // null = публичный
      timestamp: Date.now()
    });

    // Добавляем в контакты обоих
    if(uidTo) {
      set(ref(db, `users/${auth.currentUser.uid}/contacts/${uidTo}`), true);
      set(ref(db, `users/${uidTo}/contacts/${auth.currentUser.uid}`), true);
    }

    messageInput.value = "";
  };

  // ===== Загрузка сообщений =====
  function loadMessages() {
    const messagesRef = ref(db, "messages");
    onChildAdded(messagesRef, snapshot => {
      const msg = snapshot.val();
      const fromUser = uidMap[msg.uidFrom];

      if(!fromUser) return;

      // Отображаем только сообщения с текущим чатом или публичные
      if((currentChatUid && (msg.uidFrom === currentChatUid || msg.uidTo === currentChatUid)) ||
         (!currentChatUid && !msg.uidTo) ||
         msg.uidFrom === auth.currentUser.uid ||
         msg.uidTo === auth.currentUser.uid) {

        const msgDiv = document.createElement("div");
        msgDiv.className = "message";

        // аватар
        const avatarImg = document.createElement("img");
        avatarImg.src = fromUser.avatar;
        avatarImg.className = "avatarMsg";

        const textSpan = document.createElement("span");
        textSpan.textContent = msg.text;

        msgDiv.appendChild(avatarImg);
        msgDiv.appendChild(textSpan);

        // ===== Кнопки удаления/редактирования для админа =====
        if(currentUserRole === "admin") {
          const delBtn = document.createElement("button");
          delBtn.textContent = "Удалить";
          delBtn.className = "adminBtn";
          delBtn.onclick = () => remove(ref(db, "messages/" + snapshot.key));
          msgDiv.appendChild(delBtn);

          const editBtn = document.createElement("button");
          editBtn.textContent = "Редактировать";
          editBtn.className = "adminBtn";
          editBtn.onclick = () => {
            const newText = prompt("Введите новый текст:", msg.text);
            if(newText) update(ref(db, "messages/" + snapshot.key), { text: newText });
          };
          msgDiv.appendChild(editBtn);
        }

        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
    });
  }

});
</script>

<style>
body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 10px; }
h1 { color: #00BFFF; margin-bottom: 10px; }

.auth-container { display: flex; flex-direction: column; align-items: center; gap: 5px; margin-bottom: 10px; }
input { padding: 10px 12px; border-radius: 12px; border: none; background: #1E1E1E; color: #eee; width: 200px; }
input:focus { background: #292929; outline: none; box-shadow: 0 0 6px #00BFFF; }
button { padding: 10px 15px; border-radius: 12px; border: none; cursor: pointer; background: #00BFFF; color: #121212; font-weight: bold; margin-left: 5px; }
button:hover { background: #0091EA; }

#chat { display: none; flex-direction: row; width: 100%; max-width: 900px; height: 500px; border-radius: 20px; background: #1E1E1E; box-shadow: 0 0 20px rgba(0,191,255,0.2); }
#contacts { width: 200px; background: #1A1A1A; padding: 10px; border-right: 1px solid #333; overflow-y: auto; border-top-left-radius: 20px; border-bottom-left-radius: 20px; }
.contact { display: flex; align-items: center; gap: 10px; padding: 5px; border-radius: 12px; cursor: pointer; }
.contact:hover { background: #292929; }
.contact .avatar { width: 35px; height: 35px; border-radius: 50%; }

#messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
.message { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 15px; background: #292929; position: relative; max-width: 80%; }
.avatarMsg { width: 35px; height: 35px; border-radius: 50%; }
.adminBtn { margin-left: 5px; background: #FF5555; color: #fff; padding: 3px 7px; font-size: 12px; border-radius: 8px; }

.input-row { display: flex; gap: 10px; margin-top: 10px; }
#messageInput { flex: 1; padding: 10px; border-radius: 12px; border: none; background: #1E1E1E; color: #eee; }
#adminPanel { display: none; margin-bottom: 5px; padding: 5px 10px; background: #222; color: #FF5555; border-radius: 12px; box-shadow: 0 0 15px rgba(255,0,0,0.3); text-align: center; }
</style>

</head>
<body>

<h1>RP Messenger 2026</h1>

<div class="auth-container">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Пароль">
<div style="display:flex; gap:5px;">
<button id="registerBtn">Регистрация</button>
<button id="loginBtn">Войти</button>
</div>
</div>

<div id="adminPanel">Админ-панель активирована</div>

<div id="chat">
  <div id="contacts">
    <div class="contact" data-uid=""><span>Публичный чат</span></div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column;">
    <div id="messages"></div>
    <div class="input-row">
      <input id="messageInput" placeholder="Введите сообщение">
      <button id="sendBtn">Отправить</button>
    </div>
  </div>
</div>

</body>
</html>
